<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="시간표">
<title>2026-1 시간표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#F2F2F7;color:#1C1C1E}

.hdr{background:#fff;padding:12px 14px 10px;border-bottom:1px solid #E5E5EA;position:sticky;top:0;z-index:200}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.ht{font-size:16px;font-weight:700}
.hs{font-size:11px;color:#8E8E93;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:6px}
.wnav{display:flex;align-items:center;gap:6px}
.nb{background:#F2F2F7;border:none;border-radius:8px;width:34px;height:34px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#007AFF;-webkit-tap-highlight-color:transparent}
.nb:disabled{color:#C7C7CC}
.wl{font-size:15px;font-weight:600;min-width:48px;text-align:center}
.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;-webkit-tap-highlight-color:transparent}

.main{padding:10px 8px;padding-bottom:80px}
.sw{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,0.09)}

.tt{width:100%;min-width:360px;border-collapse:collapse;table-layout:fixed}
.th-t{width:40px;background:#F9F9FB;border-bottom:2px solid #E5E5EA}
.td-t{width:40px;background:#F9F9FB;border-top:1px solid #EFEFEF;padding:4px 2px;text-align:center;vertical-align:top}
.pn{display:block;font-size:10px;font-weight:700;color:#8E8E93}
.pt{display:block;font-size:9px;color:#AEAEB2;margin-top:1px}
.th-d{font-size:13px;font-weight:600;text-align:center;padding:8px 2px 6px;background:#F9F9FB;border-bottom:2px solid #E5E5EA;border-left:1px solid #EFEFEF}
.th-date{font-size:10px;font-weight:400;color:#8E8E93;display:block;margin-top:1px}
.th-d.tc{background:#F0EFFF;color:#5856D6;border-bottom:2px solid #5856D6;box-shadow:inset 2px 0 0 #5856D6,inset -2px 0 0 #5856D6}
.th-d.tc .th-date{color:#5856D6;opacity:.85}
.td-c.tc{background:#FAFAFF;box-shadow:inset 2px 0 0 #5856D6,inset -2px 0 0 #5856D6}
.tt tbody tr:last-child .td-c.tc{box-shadow:inset 2px 0 0 #5856D6,inset -2px 0 0 #5856D6,inset 0 -2px 0 #5856D6}

.td-c{border-top:1px solid #EFEFEF;border-left:1px solid #EFEFEF;padding:3px;vertical-align:top;height:58px}
.td-e{background:#FAFAFA}
.card{border-radius:8px;padding:5px 6px;height:100%;display:flex;flex-direction:column;min-height:50px}
.cn-s{font-size:11px;font-weight:700;color:#fff;line-height:1.35;word-break:keep-all;overflow-wrap:break-word;white-space:normal}
.cn-exam{font-size:12px;font-weight:800}
.cn-name{font-size:11px;font-weight:600;color:rgba(255,255,255,.95);margin-top:1px;word-break:keep-all}
.cn-p{font-size:10px;color:rgba(255,255,255,.88);margin-top:2px;word-break:keep-all}
.cn-t{font-size:9px;color:rgba(255,255,255,.72);margin-top:auto;padding-top:2px}
.lunchrow .td-t{border-top:1px dashed #C7C7CC;background:#F9F9FB}
.td-lunch{text-align:center;font-size:11px;color:#8E8E93;padding:5px;border-top:1px dashed #C7C7CC;border-left:1px solid #EFEFEF}

.legend{margin-top:10px;background:#fff;border-radius:14px;padding:12px 14px}
.lg-title{font-size:12px;font-weight:600;color:#8E8E93;margin-bottom:8px}
.lg-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.li{display:flex;align-items:flex-start;gap:6px}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:2px}
.ln{font-size:11px;color:#3C3C43;line-height:1.4;word-break:keep-all}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E5E5EA;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100}
.bn{flex:1;border:none;background:none;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#8E8E93;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bn.on{color:#007AFF}
.bn-ic{font-size:22px;line-height:1}

/* list view */
.list-wrap{padding:4px 0}
.dg{margin-bottom:8px}
.dh{font-size:12px;font-weight:700;color:#8E8E93;padding:6px 4px 4px}
.lcard{background:#fff;border-radius:12px;margin-bottom:6px;display:flex;overflow:hidden;min-height:60px}
.lc-bar{width:5px;flex-shrink:0}
.lc-body{flex:1;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.lc-s{font-size:14px;font-weight:700;word-break:keep-all}
.lc-p{font-size:12px;color:#636366}
.lc-t{font-size:11px;color:#8E8E93;margin-top:2px}

/* filter */
.fw{padding:4px 0}
.fs{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px}
.fs-ttl{font-size:13px;font-weight:700;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1.5px solid #E5E5EA;background:#fff;cursor:pointer;color:#636366;-webkit-tap-highlight-color:transparent}
.no-res{text-align:center;padding:40px;color:#8E8E93;font-size:14px}

/* calendar overlay */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.ovl.show{opacity:1;pointer-events:all}
.cal-sh{background:#fff;border-radius:20px 20px 0 0;width:100%;padding-bottom:env(safe-area-inset-bottom,16px);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.ovl.show .cal-sh{transform:translateY(0)}
.cal-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.cal-ttl{font-size:16px;font-weight:700}
.cal-x{background:none;border:none;font-size:22px;cursor:pointer;color:#636366;padding:4px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px}
.cal-m{font-size:15px;font-weight:600}
.cal-nb{background:#F2F2F7;border:none;border-radius:8px;width:30px;height:30px;font-size:18px;cursor:pointer;color:#007AFF;display:flex;align-items:center;justify-content:center}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px 14px;gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:#8E8E93;padding:4px 0}
.cday{text-align:center;padding:2px;cursor:default;-webkit-tap-highlight-color:transparent}
.cday.ck{cursor:pointer}
.cdn{font-size:14px;line-height:1;padding:6px 0 2px;border-radius:8px}
.cday.iw .cdn{background:#EEF1FF;color:#5856D6;font-weight:700;border-radius:0}
.cday.td2 .cdn{background:#007AFF!important;color:#fff!important;border-radius:8px!important}
.cdot{height:5px;display:flex;justify-content:center;align-items:center;margin-top:2px}
.dtr{width:5px;height:5px;border-radius:50%;background:#E74C3C;display:inline-block}
</style>
</head>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="ht">📚 2026-1학기 시간표</div>
      <div class="hs" id="wr"></div>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" id="cal-btn">📅</button>
      <div class="wnav" id="wnav">
        <button class="nb" id="pb">‹</button>
        <span class="wl" id="wl"></span>

</div>

<div class="main" id="main"></div>

<div class="bnav">

</div>

      <span class="cal-m" id="cal-ml"></span>

    <div class="cal-g">

      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
    </div>
    <div class="cal-g" id="cal-g"></div>
  </div>
</div>

function p2(n){return ('0'+n).slice(-2);}
function today(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function isEx(s){return s.indexOf('시험')>=0;}
function isEv(s){return EVK.indexOf(s)>=0;}
function wvals(w){var o=wdd[w];if(!o)return[];return Object.keys(o).map(function(k){return o[k];}).filter(Boolean);}
function gcol(s){return cmap[s]||'#8E8E93';}
function exLabel(s){
  if(s.indexOf('중간 시험 (퀴즈)')>=0)return['중간 시험 (퀴즈)',s.replace('중간 시험 (퀴즈)','').trim()];
  if(s.indexOf('중간 시험')>=0)return['중간 시험',s.replace('중간 시험','').trim()];
  if(s.indexOf('기말 시험')>=0)return['기말 시험',s.replace('기말 시험','').trim()];
  if(s==='조직학 시험')return['조직학 시험',''];
  return['시험',s.replace('시험','').trim()];
}

function init(){
  var t=today();
  for(var i=0;i<wks.length;i++){
    var v=wvals(wks[i]).sort();
    if(v.length&&t>=v[0]&&t<=v[v.length-1]){ci=i;break;}
  }
  var nd=new Date();cy=nd.getFullYear();cm2=nd.getMonth();

  document.getElementById('pb').onclick=function(){if(ci>0){ci--;render();}};
  document.getElementById('nb').onclick=function(){if(ci<wks.length-1){ci++;render();}};
  document.getElementById('bn-w').onclick=function(){setView('weekly');};
  document.getElementById('bn-l').onclick=function(){setView('list');};
  document.getElementById('bn-f').onclick=function(){setView('filter');};
  document.getElementById('cal-btn').onclick=function(){openCal();};
  document.getElementById('cal-x').onclick=function(){closeCal();};
  document.getElementById('ovl').onclick=function(e){if(e.target===document.getElementById('ovl'))closeCal();};
  document.getElementById('cal-p').onclick=function(){cm2--;if(cm2<0){cm2=11;cy--;}renderCal();};
  document.getElementById('cal-n').onclick=function(){cm2++;if(cm2>11){cm2=0;cy++;}renderCal();};

  render();
}

function setView(v){
  vw=v;
  document.getElementById('bn-w').className='bn'+(v==='weekly'?' on':'');
  document.getElementById('bn-l').className='bn'+(v==='list'?' on':'');
  document.getElementById('bn-f').className='bn'+(v==='filter'?' on':'');
  document.getElementById('wnav').style.display=(v==='weekly')?'flex':'none';
  render();
}

function updHdr(){
  var w=wks[ci];
  document.getElementById('wl').textContent=w+'주차';
  var v=wvals(w).sort();
  document.getElementById('wr').textContent=v.length>=2?v[0].slice(5)+' ~ '+v[v.length-1].slice(5):(v[0]||'').slice(5);
  document.getElementById('pb').disabled=(ci===0);
  document.getElementById('nb').disabled=(ci===wks.length-1);
}

function render(){
  updHdr();
  if(vw==='weekly')renderW();
  else if(vw==='list')renderL();
  else renderF();
}

/* ── WEEKLY ── */
function renderW(){
  var w=wks[ci],t=today(),dd=wdd[w]||{};
  document.getElementById('main').innerHTML=
    '<div class="sw">'+wh[w]+'</div>'
    +'<div class="legend"><div class="lg-title">과목 범례</div><div class="lg-grid">'+wl[w]+'</div></div>';
  for(var i=0;i<DAYS.length;i++){
    var d=DAYS[i];
    if(dd[d]===t){
      var els=document.querySelectorAll('[data-day="'+d+'"]');
      for(var j=0;j<els.length;j++)els[j].classList.add('tc');
    }
  }
}

/* ── LIST ── */
function lcardH(it){
  var c=gcol(it.subject),sh='',ex='';
  if(isEx(it.subject)){
    var lb=exLabel(it.subject),et=lb[0],ba=lb[1];
    sh='<div class="lc-s" style="color:#C0392B">‼️ '+et+'</div>'+(ba?'<div style="font-size:13px;color:#555;margin-top:2px">'+ba+'</div>':'');
    ex='border:2px solid '+c+';';
  }else{sh='<div class="lc-s">'+it.subject+'</div>';}
  var ph=it.professor?'<div class="lc-p">'+it.professor+'</div>':'';
  return'<div class="lcard" style="'+ex+'"><div class="lc-bar" style="background:'+c+'"></div>'
    +'<div class="lc-body">'+sh+ph+'<div class="lc-t">'+it.day+'요일 '+it.start+'~'+it.end+'</div></div></div>';
}
function byDateH(items){
  var bd={};
  for(var i=0;i<items.length;i++){var it=items[i];if(!bd[it.date])bd[it.date]=[];bd[it.date].push(it);}
  var dates=Object.keys(bd).sort(),h='';
  for(var di=0;di<dates.length;di++){
    var dt=dates[di],d=new Date(dt),grp=bd[dt];
    var lbl=dt.slice(5)+' ('+WN[d.getDay()]+')';
    var hx=false;for(var gi=0;gi<grp.length;gi++)if(isEx(grp[gi].subject)){hx=true;break;}
    h+='<div class="dg"><div class="dh">'+(hx?'‼️ ':'')+lbl+'</div>';
    grp.sort(function(a,b){return a.period-b.period;});
    for(var gi2=0;gi2<grp.length;gi2++)h+=lcardH(grp[gi2]);
    h+='</div>';
  }
  return h;
}
function renderL(){
  document.getElementById('main').innerHTML='<div class="list-wrap">'+byDateH(merged)+'</div>';
}

/* ── FILTER ── */
function renderF(){
  var eS=fsubj.filter(function(s){return isEx(s);});
  var nS=fsubj.filter(function(s){return!isEx(s)&&!isEv(s);});
  var h='<div class="fw">';
  var eo=fExam;
  h+='<div class="fs"><div class="fs-ttl">빠른 필터</div><div class="chips">';
  h+='<button class="chip" id="chip-exam" style="'+(eo?'background:#E74C3C;border-color:#E74C3C;color:#fff;font-weight:600':'border-color:#E74C3C;color:#E74C3C')+'">‼️ 시험만 보기</button>';
  var aon=!fExam&&fsubj2.length===fsubj.length;
  h+='<button class="chip" id="chip-all" style="'+(aon?'background:#007AFF;border-color:#007AFF;color:#fff;font-weight:600':'')+'" >전체 선택</button>';
  h+='<button class="chip" id="chip-clr">전체 해제</button>';
  h+='</div></div>';
  if(nS.length){
    h+='<div class="fs"><div class="fs-ttl">일반 과목</div><div class="chips">';
    for(var i=0;i<nS.length;i++){
      var s=nS[i],c=gcol(s),on2=!fExam&&fsubj2.indexOf(s)>=0;
      h+='<button class="chip fchip" data-s="'+s+'" style="'+(on2?'background:'+c+';border-color:'+c+';color:#fff;font-weight:600':'border-color:'+c+';color:'+c)+'">'+s+'</button>';
    }
    h+='</div></div>';
  }
  if(eS.length){
    h+='<div class="fs"><div class="fs-ttl">‼️ 시험</div><div class="chips">';
    for(var j=0;j<eS.length;j++){
      var se=eS[j],ce=gcol(se),oe=(fsubj2.indexOf(se)>=0&&!fExam)||fExam;
      var lb2=exLabel(se),et2=lb2[0],ba2=lb2[1];
      h+='<button class="chip fchip" data-s="'+se+'" style="'+(oe?'background:'+ce+';border-color:'+ce+';color:#fff;font-weight:600':'border-color:'+ce+';color:'+ce)+'">‼️ '+et2+(ba2?' '+ba2:'')+'</button>';
    }
    h+='</div></div>';
  }
  h+='<div id="fres"></div></div>';
  document.getElementById('main').innerHTML=h;

  document.getElementById('chip-exam').onclick=function(){fExam=!fExam;fsubj2=fExam?fsubj.filter(function(s){return isEx(s);}):fsubj.slice();renderF();};
  document.getElementById('chip-all').onclick=function(){fExam=false;fsubj2=fsubj.slice();renderF();};
  document.getElementById('chip-clr').onclick=function(){fExam=false;fsubj2=[];renderF();};
  var chips=document.querySelectorAll('.fchip');
  for(var k=0;k<chips.length;k++){
    chips[k].onclick=function(){
      var s=this.getAttribute('data-s');
      fExam=false;
      var idx=fsubj2.indexOf(s);
      if(idx>=0)fsubj2.splice(idx,1);else fsubj2.push(s);
      renderF();
    };
  }
  renderFR();
}
function renderFR(){
  var items=merged.slice();
  if(fExam)items=items.filter(function(i){return isEx(i.subject);});
  else items=items.filter(function(i){return fsubj2.indexOf(i.subject)>=0||isEv(i.subject);});
  var el=document.getElementById('fres');if(!el)return;
  if(!items.length){el.innerHTML='<div class="no-res">조건에 맞는 수업이 없습니다</div>';return;}
  el.innerHTML='<div class="list-wrap">'+byDateH(items)+'</div>';
}

/* ── CALENDAR ── */
function openCal(){
  var nd=new Date();cy=nd.getFullYear();cm2=nd.getMonth();
  renderCal();
  document.getElementById('ovl').classList.add('show');
}
function closeCal(){document.getElementById('ovl').classList.remove('show');}
function renderCal(){
  document.getElementById('cal-ml').textContent=cy+'년 '+ML[cm2];
  var t=today(),dw={},cv=wvals(wks[ci]);
  for(var wi=0;wi<wks.length;wi++){var w2=wks[wi],o=wdd[w2]||{},ks=Object.keys(o);for(var ki=0;ki<ks.length;ki++)if(o[ks[ki]])dw[o[ks[ki]]]=true;}
  var edSet={};for(var ei=0;ei<ed.length;ei++)edSet[ed[ei]]=true;
  var first=new Date(cy,cm2,1),last=new Date(cy,cm2+1,0),g='';
  for(var i=0;i<first.getDay();i++)g+='<div class="cday"></div>';
  for(var day=1;day<=last.getDate();day++){
    var ds=cy+'-'+p2(cm2+1)+'-'+p2(day);
    var dow=new Date(cy,cm2,day).getDay(),isWD=dow>=1&&dow<=5;
    var hx=!!edSet[ds],it2=ds===t,iw=cv.indexOf(ds)>=0&&isWD,ck=!!dw[ds];
    var cls='cday'+(ck?' ck':'')+(it2?' td2':'')+(iw&&!it2?' iw':'');
    var dot=hx?'<div class="cdot"><span class="dtr"></span></div>':'<div class="cdot"></div>';
    var oc=ck?' id="cd-'+ds+'"':'';
    g+='<div class="'+cls+'"'+oc+'><div class="cdn">'+day+'</div>'+dot+'</div>';
  }
  document.getElementById('cal-g').innerHTML=g;
  if(ck){
    var ckEls=document.querySelectorAll('.cday.ck');
    for(var ci2=0;ci2<ckEls.length;ci2++){
      ckEls[ci2].onclick=(function(el){
        return function(){
          var id=el.id;if(!id)return;
          var ds2=id.replace('cd-','');
          for(var ii=0;ii<wks.length;ii++){if(wvals(wks[ii]).indexOf(ds2)>=0){ci=ii;break;}}
          closeCal();setView('weekly');render();
        };
      })(ckEls[ci2]);
    }
  }
}

init();
</script>
</body>
</html>
