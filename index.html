* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f0f4f8; color: #1a2333; }

.header { background: linear-gradient(135deg, #1a3a6b 0%, #2d5fa0 100%); color: white; padding: 18px 16px 14px; text-align: center; }
.header h1 { font-size: 1.25rem; font-weight: 700; }
.header p  { font-size: 0.78rem; opacity: 0.75; margin-top: 3px; }

.nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px;
       background: white; border-bottom: 1px solid #e2e8f0;
       position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.nav button { background: #1a3a6b; color: white; border: none; border-radius: 8px;
              padding: 9px 18px; font-size: 0.9rem; cursor: pointer; font-weight: 700; min-width: 72px; }
.nav button:active { background: #2d5fa0; }
.nav button:disabled { background: #cbd5e0; }
.week-info { text-align: center; flex: 1; }
.week-info .week-num  { font-size: 1.05rem; font-weight: 800; color: #1a3a6b; }
.week-info .week-date { font-size: 0.73rem; color: #718096; margin-top: 2px; }

/* upload bar */
.upload-bar { display: flex; align-items: center; justify-content: center; gap: 10px;
              padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.upload-bar label { background: #e0e7ff; color: #3730a3; border-radius: 8px;
                    padding: 7px 14px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
.upload-bar label:hover { background: #c7d2fe; }
.upload-bar input { display: none; }
.upload-bar span { font-size: 0.75rem; color: #718096; }

.container { padding: 12px; max-width: 900px; margin: 0 auto; }

.table-wrap { overflow-x: auto; border-radius: 12px;
              box-shadow: 0 4px 16px rgba(0,0,0,0.09);
              -webkit-overflow-scrolling: touch; }

table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; }
col.period-col { width: 62px; }
col.day-col    { width: calc((100% - 62px) / 5); }

thead th { background: #1a3a6b; color: white; padding: 10px 4px;
           font-size: 0.78rem; font-weight: 700; text-align: center;
           border: 1px solid #162f5a; word-break: keep-all; }

tbody td { border: 1px solid #e2e8f0; vertical-align: top;
           text-align: center; padding: 3px; }
tbody td.period-label { background: #f1f5f9; font-weight: 600; font-size: 0.64rem;
                        color: #4a5568; padding: 5px 3px; vertical-align: middle;
                        text-align: center; line-height: 1.45; word-break: keep-all; }

.cell-inner { padding: 4px 3px; display: flex; flex-direction: column;
              align-items: center; justify-content: center; gap: 2px;
              border-radius: 6px; min-height: 44px; word-break: keep-all; }
.cell-inner .subj { font-weight: 700; font-size: 0.7rem; line-height: 1.35;
                    word-break: keep-all; white-space: normal; width: 100%; text-align: center; }
.cell-inner .prof { font-size: 0.62rem; opacity: 0.85; white-space: normal;
                    width: 100%; text-align: center; }

/* holiday cell: no background, just text */
.cell-holiday { padding: 4px 3px; display: flex; flex-direction: column;
                align-items: center; justify-content: center; gap: 2px;
                min-height: 44px; }
.cell-holiday .subj { font-size: 0.68rem; font-weight: 600; color: #e53e3e;
                       white-space: normal; word-break: keep-all; text-align: center; }

.legend { display: flex; flex-wrap: wrap; gap: 7px; padding: 14px 4px; }
.legend-title { font-size: 0.78rem; font-weight: 700; color: #4a5568; width: 100%; margin-bottom: 2px; }
.legend-item  { display: flex; align-items: center; gap: 5px; font-size: 0.76rem; }
.legend-dot   { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }
</style>

  ['1교시','8:30~9:20'],   ['2교시','9:30~10:20'],  ['3교시','10:30~11:20'],
  ['4교시','11:30~12:20'], ['5교시','13:30~14:20'],  ['6교시','14:30~15:20'],
  ['7교시','15:30~16:20'], ['8교시','16:30~17:20'],  ['9교시','17:30~18:20'],
  ['10교시','18:30~19:20']
];
var PERIOD_LABELS = PERIOD_DEFS.map(function(p){ return p[0]+' ('+p[1]+')'; });
var WEEKDAYS = ['월','화','수','목','금'];

var HOLIDAY_KW = ['공휴일','휴일','근로자의 날','어린이날','현충일','광복절','추석','설날','삼일절','개천절','한글날','대체','휴강'];
function isHoliday(s){ return HOLIDAY_KW.some(function(k){ return s.indexOf(k)>=0; }); }
function isExam(s)   { return /시험|퀴즈|exam/i.test(s); }

var COLORS = [
  ['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#fef9c3','#854d0e'],
  ['#fce7f3','#9d174d'],['#ede9fe','#5b21b6'],['#ffedd5','#9a3412'],
  ['#cffafe','#155e75'],['#fef2f2','#991b1b'],['#ecfdf5','#14532d'],
  ['#f5f3ff','#4c1d95'],['#fff7ed','#7c2d12'],['#fdf4ff','#6b21a8'],
  ['#fffbeb','#78350f'],['#f0f9ff','#0c4a6e'],['#f5f5f4','#1c1917']
];
var TODAY_COLOR = '#4f46e5'; /* indigo */

var colorMap = {}; var colorIdx = 0;
function getColor(s){
  if(!colorMap[s]){ colorMap[s]=COLORS[colorIdx%COLORS.length]; colorIdx++; }
  return colorMap[s];
}

var weeks = [];
(function(){ for(var k in WDD){ var n=parseInt(k); if(weeks.indexOf(n)<0) weeks.push(n); } weeks.sort(function(a,b){return a-b;}); })();

var today = new Date().toISOString().slice(0,10);
var currentIdx = 0;
for(var _i=0;_i<weeks.length;_i++){
  var _w=WDD[weeks[_i].toString()]||{};
  var _d=Object.keys(_w).map(function(k){return _w[k];}).filter(Boolean).sort();
  if(_d.length && _d[0]<=today) currentIdx=_i;
}

function changeWeek(dir){
  currentIdx=Math.max(0,Math.min(weeks.length-1,currentIdx+dir));
  render();
}

/* ───── 오늘 컬럼 바깥 테두리만 ───── */
function applyTodayBorder(colIdx){
  /* colIdx: 0~4 for 월~금, -1 if not today */
  if(colIdx<0) return;
  var W='3px', C=TODAY_COLOR;
  var table=document.getElementById('timetable');
  var allRows=table.querySelectorAll('tr');
  var totalRows=allRows.length;
  allRows.forEach(function(row,ri){
    var cells=row.querySelectorAll('th,td');
    var cell=cells[colIdx+1]; /* +1 for period column */
    if(!cell) return;
    cell.style.borderLeft  = W+' solid '+C;
    cell.style.borderRight = W+' solid '+C;
    if(ri===0)           cell.style.borderTop    = W+' solid '+C;
    if(ri===totalRows-1) cell.style.borderBottom = W+' solid '+C;
  });
}

function render(){
  var week=weeks[currentIdx];
  var data=DATA.filter(function(d){return d.week===week;});
  var wddW=WDD[week.toString()]||{};

  document.getElementById('prevBtn').disabled = currentIdx===0;
  document.getElementById('nextBtn').disabled = currentIdx===weeks.length-1;
  document.getElementById('weekNum').textContent = week+'주차';

  var allDates=WEEKDAYS.map(function(d){return wddW[d]||'';}).filter(Boolean).sort();
  var range = allDates.length>=2
    ? allDates[0].slice(5)+' ~ '+allDates[allDates.length-1].slice(5)
    : allDates.length ? allDates[0].slice(5) : '';
  document.getElementById('weekDate').textContent=range;

  var lookup={};
  data.forEach(function(d){
    if(!lookup[d.dow]) lookup[d.dow]={};
    if(!lookup[d.dow][d.period]) lookup[d.dow][d.period]=[];
    lookup[d.dow][d.period].push(d);
  });

  var todayColIdx=-1;
  WEEKDAYS.forEach(function(d,i){ if((wddW[d]||'')===today) todayColIdx=i; });

  /* build table */
  var html='<colgroup><col class="period-col">';
  for(var c=0;c<5;c++) html+='<col class="day-col">';
  html+='</colgroup><thead><tr><th>교시</th>';

  WEEKDAYS.forEach(function(d){
    var date=wddW[d]||'';
    var dl=date?'<br><span style="font-weight:400;opacity:0.75;font-size:0.65rem">'+date.slice(5)+'</span>':'';
    html+='<th>'+d+dl+'</th>';
  });
  html+='</tr></thead><tbody>';

  for(var pi=0;pi<PERIOD_DEFS.length;pi++){
    var pLabel=PERIOD_LABELS[pi];
    html+='<tr><td class="period-label">'+PERIOD_DEFS[pi][0]+'<br>'
         +'<span style="font-size:0.59rem;font-weight:400">'+PERIOD_DEFS[pi][1]+'</span></td>';

    WEEKDAYS.forEach(function(day){
      var entries=lookup[day]&&lookup[day][pLabel];
      if(entries&&entries.length>0){
        var e=entries[0];
        if(e.holiday){
          html+='<td><div class="cell-holiday"><span class="subj">'+e.subject+'</span></div></td>';
        } else {
          var c=getColor(e.subject);
          var mark=isExam(e.subject)?'‼️ ':'';
          html+='<td><div class="cell-inner" style="background:'+c[0]+';color:'+c[1]+'">'
               +'<span class="subj">'+mark+e.subject+'</span>'
               +(e.professor?'<span class="prof">'+e.professor+'</span>':'')
               +'</div></td>';
        }
      } else {
        html+='<td></td>';
      }
    });
    html+='</tr>';
  }
  html+='</tbody>';
  document.getElementById('timetable').innerHTML=html;

  /* apply today outer border AFTER innerHTML set */
  applyTodayBorder(todayColIdx);

  /* legend */
  var subjs=[];
  data.forEach(function(d){ if(!d.holiday&&subjs.indexOf(d.subject)<0) subjs.push(d.subject); });
  subjs.sort();
  subjs.forEach(function(s){ getColor(s); });
  var leg='<div class="legend-title">📚 이번 주 과목</div>';
  subjs.forEach(function(s){
    var c=getColor(s);
    var mark=isExam(s)?'‼️ ':'';
    leg+='<div class="legend-item"><div class="legend-dot" style="background:'+c[0]+';border:2px solid '+c[1]+'"></div><span>'+mark+s+'</span></div>';
  });
  document.getElementById('legend').innerHTML=leg;
}

/* ───── Excel Re-upload (SheetJS) ───── */
function loadExcel(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){ alert('데이터를 읽을 수 없습니다.'); return; }

      /* find column names */
      var keys=Object.keys(rows[0]);
      function findCol(keyword){
        return keys.find(function(k){ return k.replace(/\n/g,'').indexOf(keyword)>=0; })||'';
      }
      var PCOLS=[
        findCol('1교시'), findCol('2교시'), findCol('3교시'), findCol('4교시'),
        findCol('5교시'), findCol('6교시'), findCol('7교시'), findCol('8교시'),
        findCol('9교시'), findCol('10교시')
      ];
      var wkCol=findCol('주차'), dtCol=findCol('날짜'), dwCol=findCol('요일');

      var newData=[]; var newWDD={};
      var HKWS=['공휴일','휴일','근로자의 날','어린이날','현충일','광복절','추석','설날','삼일절','개천절','한글날','대체','휴강'];
      function hol(s){ return HKWS.some(function(k){return s.indexOf(k)>=0;}); }

      rows.forEach(function(row){
        var wk=row[wkCol]; if(!wk) return;
        var wkn=parseInt(wk); if(isNaN(wkn)) return;
        var dw=String(row[dwCol]||'').trim(); if(!dw) return;
        var dt=row[dtCol];
        var dtStr='';
        if(dt instanceof Date){
          dtStr=dt.toISOString().slice(0,10);
        } else if(typeof dt==='string'&&dt.length>=10){
          dtStr=dt.slice(0,10);
        }
        var wkKey=wkn.toString();
        if(!newWDD[wkKey]) newWDD[wkKey]={};
        if(!newWDD[wkKey][dw]) newWDD[wkKey][dw]=dtStr;

        PCOLS.forEach(function(col,idx){
          if(!col) return;
          var cell=String(row[col]||'').trim();
          if(!cell) return;
          var val=cell.split('\n')[0];
          var parts=val.split('-',2);
          var subj=parts[0].trim();
          var prof=parts.length>1?parts[1].trim():'';
          newData.push({
            week:wkn, date:dtStr, dow:dw,
            period:PERIOD_LABELS[idx],
            subject:subj, professor:prof, holiday:hol(subj)
          });
        });
      });

      DATA=newData; WDD=newWDD;
      colorMap={}; colorIdx=0;
      weeks=[];
      for(var k in WDD){ var n=parseInt(k); if(weeks.indexOf(n)<0) weeks.push(n); }
      weeks.sort(function(a,b){return a-b;});
      currentIdx=Math.max(0,Math.min(weeks.length-1,currentIdx));
      render();
      alert('✅ 시간표가 업데이트 되었습니다! ('+newData.length+'개 수업)');
    } catch(err){
      alert('오류: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

render();
</script>
