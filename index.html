<html lang="ko">
<head>
<meta charset="UTF-8">

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#F2F2F7;color:#1C1C1E}

.hdr{background:#fff;padding:12px 14px 10px;border-bottom:1px solid #E5E5EA;position:sticky;top:0;z-index:200}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.ht{font-size:16px;font-weight:700}
.hs{font-size:11px;color:#8E8E93;margin-top:2px}
.wnav{display:flex;align-items:center;gap:6px}
.nb{background:#F2F2F7;border:none;border-radius:8px;width:34px;height:34px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#007AFF;-webkit-tap-highlight-color:transparent}
.nb:disabled{color:#C7C7CC}
.wl{font-size:15px;font-weight:600;min-width:48px;text-align:center}

.main{padding:10px 8px}
.sw{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,0.09)}

.tt{width:100%;min-width:360px;border-collapse:collapse;table-layout:fixed}

/* time col */
.th-t{width:40px;background:#F9F9FB;border-bottom:2px solid #E5E5EA}
.td-t{width:40px;background:#F9F9FB;border-top:1px solid #EFEFEF;padding:4px 2px;text-align:center;vertical-align:top}
.pn{display:block;font-size:10px;font-weight:700;color:#8E8E93}
.pt{display:block;font-size:9px;color:#AEAEB2;margin-top:1px}

/* day headers */
.th-d{font-size:13px;font-weight:600;text-align:center;padding:8px 2px 6px;background:#F9F9FB;border-bottom:2px solid #E5E5EA;border-left:1px solid #EFEFEF}
.th-date{font-size:10px;font-weight:400;color:#8E8E93;display:block;margin-top:1px}

/* today highlight — indigo */
.th-d.tc{background:#F0EFFF;color:#5856D6;border-bottom:2px solid #5856D6;box-shadow:inset 2px 0 0 #5856D6,inset -2px 0 0 #5856D6}
.th-d.tc .th-date{color:#5856D6;opacity:.85}
.td-c.tc{background:#FAFAFF;box-shadow:inset 2px 0 0 #5856D6,inset -2px 0 0 #5856D6}
/* last tbody row */
.tt tbody tr:last-child .td-c.tc{box-shadow:inset 2px 0 0 #5856D6,inset -2px 0 0 #5856D6,inset 0 -2px 0 #5856D6}

/* class cells */
.td-c{border-top:1px solid #EFEFEF;border-left:1px solid #EFEFEF;padding:3px;vertical-align:top;height:58px}
.td-e{background:#FAFAFA}

.card{border-radius:8px;padding:5px 6px;height:100%;display:flex;flex-direction:column;min-height:50px}
.cn-s{font-size:11px;font-weight:700;color:#fff;line-height:1.35;word-break:keep-all;overflow-wrap:break-word;white-space:normal}
.cn-p{font-size:10px;color:rgba(255,255,255,.88);margin-top:2px;word-break:keep-all}
.cn-t{font-size:9px;color:rgba(255,255,255,.72);margin-top:auto;padding-top:2px}

/* lunch */
.lunchrow .td-t{border-top:1px dashed #C7C7CC;background:#F9F9FB}
.td-lunch{text-align:center;font-size:11px;color:#8E8E93;padding:5px;border-top:1px dashed #C7C7CC;border-left:1px solid #EFEFEF}

/* legend */
.legend{margin-top:10px;background:#fff;border-radius:14px;padding:12px 14px}
.lg-title{font-size:12px;font-weight:600;color:#8E8E93;margin-bottom:8px}
.lg-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.li{display:flex;align-items:flex-start;gap:6px}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:2px}
.ln{font-size:11px;color:#3C3C43;line-height:1.4;word-break:keep-all}
</style>
</head>

</div>
