<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#F2F2F7;color:#1C1C1E}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#4F8EF7 0%,#6C63FF 100%);padding:10px 14px 8px;padding-top:calc(10px + env(safe-area-inset-top));border-bottom:none;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(79,142,247,0.25)}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.ht{font-size:15px;font-weight:700;color:#fff}
.hs{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:6px}
.wnav{display:flex;align-items:center;gap:4px}
.nb{background:rgba(255,255,255,0.2);border:none;border-radius:8px;width:32px;height:32px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;-webkit-tap-highlight-color:transparent}
.nb:disabled{color:rgba(255,255,255,0.3)}
.wl{font-size:14px;font-weight:700;min-width:44px;text-align:center;color:#fff}
.icon-btn{background:rgba(255,255,255,0.2);border:none;font-size:18px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;-webkit-tap-highlight-color:transparent}

/* ── MAIN ── */
.main{padding:8px 6px;padding-bottom:80px}
.sw{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.08)}

/* ── TABLE ── */
.tt{width:100%;min-width:320px;border-collapse:collapse;table-layout:fixed}

/* 교시 열 */
.th-t{width:36px;background:#5B8AF0;border-bottom:2px solid #5B8AF0;padding:0}
.td-t{
  width:36px;
  background:#fff;
  border-top:1px solid #EFEFEF;
  padding:0 2px;
  text-align:center;
  vertical-align:middle;
  height:58px;
}
.pn{display:block;font-size:10px;font-weight:700;color:#8E8E93;line-height:1.2}
.pt{display:block;font-size:8px;color:#AEAEB2;margin-top:1px}

/* 요일 헤더 – 채색 */
.th-d{
  font-size:13px;font-weight:700;text-align:center;
  padding:8px 2px 7px;
  background:#5B8AF0;
  color:#fff;
  border-bottom:2px solid #5B8AF0;
  border-left:1px solid rgba(255,255,255,0.15);
}
.th-date{font-size:9px;font-weight:400;color:rgba(255,255,255,0.75);display:block;margin-top:2px}

/* 오늘 요일 강조 */
.th-d.tc{background:#6C63FF;border-bottom:2px solid #6C63FF}
.th-d.tc .th-date{color:rgba(255,255,255,0.9)}
.td-c.tc{background:#EEF2FF}

/* 일반 셀 - 빈 셀 모두 흰색으로 통일 */
.td-c{
  border-top:1px solid #EFEFEF;
  border-left:1px solid #EFEFEF;
  padding:2px;
  vertical-align:top;
  height:58px;
  overflow:hidden;
  background:#fff;
}
.td-e{background:#fff}

/* 수업 카드 */
.card{
  border-radius:7px;
  padding:4px 5px;
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
/* rowspan 적용 시 카드 높이 자동 */
.td-c[rowspan] .card{height:100%}

.cn-s{
  font-size:10.5px;font-weight:700;color:#fff;
  line-height:1.3;
  word-break:keep-all;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
}
.cn-exam{font-size:11px;font-weight:800}
.cn-name{font-size:10px;font-weight:600;color:rgba(255,255,255,.9);margin-top:1px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cn-p{
  font-size:9.5px;color:rgba(255,255,255,.85);margin-top:1px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.cn-t{font-size:8.5px;color:rgba(255,255,255,.7);margin-top:auto;padding-top:2px;white-space:nowrap}

/* 점심 행 */
.lunchrow .td-t{border-top:1px dashed #C7C7CC;background:#EBEBEB;height:22px!important;padding:0}
.td-lunch{text-align:center;font-size:9.5px;color:#8E8E93;padding:2px 4px;
  border-top:1px dashed #C7C7CC;border-left:1px solid #D8D8D8;background:#EBEBEB;height:22px}

/* ── LEGEND ── */
.legend{margin-top:8px;background:#fff;border-radius:12px;padding:10px 12px}
.lg-title{font-size:11px;font-weight:600;color:#8E8E93;margin-bottom:7px}
.lg-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.li{display:flex;align-items:flex-start;gap:5px}
.ld{width:9px;height:9px;border-radius:3px;flex-shrink:0;margin-top:2px}
.ln{font-size:10.5px;color:#3C3C43;line-height:1.4;word-break:keep-all}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E5E5EA;
  display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100;
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
.bn{flex:1;border:none;background:none;padding:7px 4px 5px;display:flex;flex-direction:column;
  align-items:center;gap:2px;font-size:10px;color:#8E8E93;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bn.on{color:#007AFF}
.bn-ic{font-size:20px;line-height:1}

/* ── LIST VIEW ── */
.list-wrap{padding:4px 0}
.dg{margin-bottom:8px}
.dh{font-size:12px;font-weight:700;color:#8E8E93;padding:6px 4px 4px}
.lcard{background:#fff;border-radius:10px;margin-bottom:5px;display:flex;overflow:hidden;min-height:56px}
.lc-bar{width:4px;flex-shrink:0}
.lc-body{flex:1;padding:9px 12px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.lc-s{font-size:13px;font-weight:700;word-break:keep-all}
.lc-p{font-size:11px;color:#636366}
.lc-t{font-size:10px;color:#8E8E93;margin-top:2px}

/* ── FILTER ── */
.fw{padding:4px 0}
.fs{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px}
.fs-ttl{font-size:12px;font-weight:700;margin-bottom:9px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 11px;border-radius:18px;font-size:11px;border:1.5px solid #E5E5EA;
  background:#fff;cursor:pointer;color:#636366;-webkit-tap-highlight-color:transparent}
.no-res{text-align:center;padding:36px;color:#8E8E93;font-size:13px}

/* ── CALENDAR OVERLAY ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.ovl.show{opacity:1;pointer-events:all}
.cal-sh{background:#fff;border-radius:20px 20px 0 0;width:100%;
  padding-bottom:env(safe-area-inset-bottom,16px);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.ovl.show .cal-sh{transform:translateY(0)}
.cal-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.cal-ttl{font-size:15px;font-weight:700}
.cal-x{background:none;border:none;font-size:20px;cursor:pointer;color:#636366;padding:4px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px}
.cal-m{font-size:14px;font-weight:600}
.cal-nb{background:#F2F2F7;border:none;border-radius:8px;width:28px;height:28px;
  font-size:16px;cursor:pointer;color:#007AFF;display:flex;align-items:center;justify-content:center}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px 12px;gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:#8E8E93;padding:3px 0}
.cday{text-align:center;padding:1px;cursor:default;-webkit-tap-highlight-color:transparent}
.cday.ck{cursor:pointer}
.cdn{font-size:13px;line-height:1;padding:5px 0 2px;border-radius:7px}
.cday.iw .cdn{background:#EEF1FF;color:#3B5BDB;font-weight:700;border-radius:0}
.cday.td2 .cdn{background:#007AFF!important;color:#fff!important;border-radius:7px!important}
.cdot{height:5px;display:flex;justify-content:center;align-items:center;margin-top:1px}
.dtr{width:4px;height:4px;border-radius:50%;background:#E74C3C;display:inline-block}

/* ── EXCEL UPLOAD OVERLAY ── */
.xl-ovl{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.xl-ovl.show{opacity:1;pointer-events:all}
.xl-sh{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:20px 20px 36px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.xl-ovl.show .xl-sh{transform:translateY(0)}
.xl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.xl-ttl{font-size:16px;font-weight:700}
.xl-x{background:none;border:none;font-size:22px;cursor:pointer;color:#636366}
.xl-desc{font-size:12px;color:#636366;line-height:1.6;margin-bottom:16px;background:#F9F9FB;
  border-radius:10px;padding:12px}
.xl-desc code{background:#E5E5EA;border-radius:4px;padding:1px 4px;font-size:11px}
.xl-dropzone{border:2px dashed #C7C7CC;border-radius:12px;padding:28px 16px;
  text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
.xl-dropzone:hover,.xl-dropzone.drag{border-color:#007AFF;background:#F0F6FF}
.xl-dropzone input{display:none}
.xl-di{font-size:30px;margin-bottom:8px}
.xl-dt{font-size:13px;font-weight:600;color:#1C1C1E;margin-bottom:4px}
.xl-ds{font-size:11px;color:#8E8E93}
.xl-status{font-size:12px;color:#636366;min-height:18px;text-align:center}
.xl-status.ok{color:#27AE60;font-weight:600}
.xl-status.err{color:#E74C3C}
.xl-btn{width:100%;background:#007AFF;color:#fff;border:none;border-radius:12px;
  padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.xl-btn:disabled{background:#C7C7CC;cursor:not-allowed}

/* ── FORMAT INFO BADGE ── */
.fmt-badge{display:inline-flex;align-items:center;gap:4px;background:#EEF1FF;
  color:#3B5BDB;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600;
  margin-left:6px;vertical-align:middle}
</style>
</head>

    </div>

   공통 상수 & 유틸
══════════════════════════════════════════ */
var DAYS = ['월','화','수','목','금'];
var WN   = ['일','월','화','수','목','금','토'];
var ML   = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
var EVK  = ['진급식','근로자의날','대체휴무','어린이날','지방선거','개교기념일'];
/* 휴일 키워드 (색상 없이 텍스트만 표시) */
var HOLIDAY_KW = ['근로자의날','대체휴무','어린이날','지방선거','개교기념일','공휴일','현충일','광복절','추석','설날','삼일절'];

var ci=0, vw='weekly', cy, cm2;
var fExam=false, fsubj2=fsubj.slice();
var pendingData=null; // 엑셀 업로드 대기 데이터

function p2(n){return ('0'+n).slice(-2);}
function today(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function isEx(s){return s.indexOf('시험')>=0;}
function isEv(s){return EVK.indexOf(s)>=0;}
function wvals(w){var o=wdd[w];if(!o)return[];return Object.keys(o).map(function(k){return o[k];}).filter(Boolean);}
function gcol(s){return cmap[s]||'#8E8E93';}
function isHoliday(s){
  for(var i=0;i<HOLIDAY_KW.length;i++){if(s.indexOf(HOLIDAY_KW[i])>=0)return true;}
  return false;
}
function fmtDate(ds){/* "2026-03-17" → "03.17" */if(!ds)return'';var p=ds.split('-');return p.length>=3?p[1]+'.'+p[2]:ds.slice(5).replace('-','.');}
function exLabel(s){
  if(s.indexOf('중간 시험 (퀴즈)')>=0)return['중간 시험 (퀴즈)',s.replace('중간 시험 (퀴즈)','').trim()];
  if(s.indexOf('중간 시험')>=0)return['중간 시험',s.replace('중간 시험','').trim()];
  if(s.indexOf('기말 시험')>=0)return['기말 시험',s.replace('기말 시험','').trim()];
  if(s==='조직학 시험')return['조직학 시험',''];
  return['시험',s.replace('시험','').trim()];
}

/* ══════════════════════════════════════════
   CSV 파서 (RFC4180)
══════════════════════════════════════════ */
function parseCSV(text){
  var rows=[];
  var lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  for(var i=0;i<lines.length;i++){
    if(!lines[i].trim())continue;
    var cols=[],cur='',inQ=false;
    for(var j=0;j<lines[i].length;j++){
      var ch=lines[i][j];
      if(ch==='"'){
        if(inQ&&lines[i][j+1]==='"'){cur+='"';j++;}
        else inQ=!inQ;
      }else if(ch===','&&!inQ){cols.push(cur);cur='';}
      else cur+=ch;
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

/* ── 실제 엑셀 형식 파서 (주차/날짜/요일/1교시~10교시) ── */
var PERIOD_TIMES_MAP={1:['8:30','9:20'],2:['9:30','10:20'],3:['10:30','11:20'],4:['11:30','12:20'],
  5:['13:30','14:20'],6:['14:30','15:20'],7:['15:30','16:20'],8:['16:30','17:20'],9:['17:30','18:20'],10:['18:30','19:20']};
var KNOWN_SUBJ_SET={
  '진급식':1,'근로자의날':1,'대체휴무':1,'어린이날':1,'지방선거':1,
  '문제바탕학습1':1,'생애주기':1,'시험':1,'실험및논문연구2':1,'의료면담1':1,
  '의학생화학':1,'의학생화학 기말 시험':1,'의학생화학 중간 시험 (퀴즈)':1,
  '인체미세구조 실습':1,'인체미세구조와 기능':1,'인체반응 및 병태생리':1,
  '인체질병형태학실습':1,'조직학 시험':1,'환자의사사회1':1
};
var KNOWN_SUBJ_LIST=Object.keys(KNOWN_SUBJ_SET);

function parseNativeCell(val){
  /* "과목명-교수명" 또는 "과목명\n추가정보" 형태 파싱 */
  if(!val&&val!==0)return null;
  var s=String(val).trim();
  if(!s||s===',')return null;
  var lines=s.split(/[\n\r]+/).map(function(l){return l.trim();}).filter(Boolean);
  var main=lines[0];
  var extra=lines.slice(1).join(' ');
  var subj=main,prof='';
  if(main.indexOf('-')>=0){
    var idx=main.lastIndexOf('-');
    subj=main.slice(0,idx).trim();
    prof=main.slice(idx+1).trim();
  }
  if(extra)subj=subj+' '+extra;
  /* 알려진 과목명으로 정규화 */
  for(var ki=0;ki<KNOWN_SUBJ_LIST.length;ki++){
    var ks=KNOWN_SUBJ_LIST[ki];
    if(subj.indexOf(ks)===0&&subj!==ks){
      var rem=subj.slice(ks.length).trim();
      if(!rem||rem.charAt(0)==='-'){
        if(!prof&&rem.charAt(0)==='-')prof=rem.slice(1).trim();
        subj=ks;break;
      }
    }
  }
  return{subj:subj,prof:prof};
}

function isNativeFormat(rows){
  /* 헤더 행에 "주차","날짜","요일" 이 있으면 native 형식 */
  if(!rows||!rows[0])return false;
  var h0=String(rows[0][0]||'').trim();
  var h1=String(rows[0][1]||'').trim();
  var h2=String(rows[0][2]||'').trim();
  return(h0==='주차'||h0==='1')&&(h1==='날짜'||h1.match(/\d{4}/))&&(h2==='요일'||['월','화','수','목','금','토','일'].indexOf(h2)>=0)
    ||(h0==='주차'&&(h1==='날짜'||h1==='date')&&(h2==='요일'||h2==='day'));
}

function parseNativeRows(rows){
  var VALID={'월':1,'화':1,'수':1,'목':1,'금':1};
  var items=[],wddLocal={},edLocal=[];
  /* 헤더 행 체크 - 첫 행이 주차/날짜/요일이면 skip */
  var startRow=0;
  if(rows[0]&&(String(rows[0][0]).trim()==='주차'||String(rows[0][0]).trim()==='week'))startRow=1;

  for(var r=startRow;r<rows.length;r++){
    var row=rows[r];
    var weekRaw=row[0],dateRaw=row[1],dayRaw=row[2];
    if(!weekRaw||!dateRaw||!dayRaw)continue;
    var wk=String(weekRaw).trim();
    if(!wk||isNaN(parseInt(wk)))continue;
    wk=String(parseInt(wk));
    var day=String(dayRaw).trim();
    if(!VALID[day])continue;
    /* 날짜 정규화 */
    var dateStr='';
    if(typeof dateRaw==='string'&&dateRaw.match(/\d{4}-\d{2}-\d{2}/)){
      dateStr=dateRaw.slice(0,10);
    }else if(typeof dateRaw==='string'&&dateRaw.match(/\d{4}\/\d{1,2}\/\d{1,2}/)){
      var dp=dateRaw.split('/');dateStr=dp[0]+'-'+('0'+dp[1]).slice(-2)+'-'+('0'+dp[2]).slice(-2);
    }else if(typeof dateRaw==='number'){
      /* Excel serial date */
      var d=new Date(Math.round((dateRaw-25569)*86400*1000));
      dateStr=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
    }else{
      var dp2=String(dateRaw).replace(/[.\-\/]/g,'-').trim();
      if(dp2.match(/^\d{4}-\d{1,2}-\d{1,2}$/)){
        var pp=dp2.split('-');dateStr=pp[0]+'-'+('0'+pp[1]).slice(-2)+'-'+('0'+pp[2]).slice(-2);
      }
    }
    if(!dateStr)continue;
    if(!wddLocal[wk])wddLocal[wk]={};
    wddLocal[wk][day]=dateStr;
    /* 교시 1~10 = 컬럼 3~12 */
    for(var p=1;p<=10;p++){
      var cellVal=row[2+p];
      if(cellVal===null||cellVal===undefined||cellVal==='')continue;
      var parsed=parseNativeCell(cellVal);
      if(!parsed||!parsed.subj)continue;
      var t=PERIOD_TIMES_MAP[p];
      var examFlag=parsed.subj.indexOf('시험')>=0||parsed.subj.indexOf('퀴즈')>=0;
      if(examFlag&&edLocal.indexOf(dateStr)<0)edLocal.push(dateStr);
      items.push({week:wk,date:dateStr,day:day,period:p,
        start:t[0],end:t[1],subject:parsed.subj,professor:parsed.prof,is_exam:examFlag});
    }
  }
  if(!items.length)return{error:'수업 데이터를 찾을 수 없습니다. 엑셀 형식을 확인해주세요.'};
  return{items:items,wddLocal:wddLocal,edLocal:edLocal};
}

function csvRowsToItems(rows){
  /* native 형식 자동 감지 */
  if(rows.length>=2){
    var h=rows[0]||[];
    var h0=String(h[0]||'').trim().toLowerCase();
    var h1=String(h[1]||'').trim().toLowerCase();
    var h2=String(h[2]||'').trim().toLowerCase();
    /* 한국어 헤더 (주차/날짜/요일) 또는 첫 데이터행이 숫자+날짜 형태 */
    if(h0==='주차'||(h0!=='week'&&(h1==='날짜'||h2==='요일'||h2==='월'||h2==='화'))){
      var res=parseNativeRows(rows);
      if(res.error)return res;
      return res.items; /* buildFromItems에서 사용 */
    }
  }
  /* 기존 CSV 형식 (week,date,day,...) */
  if(rows.length<2)return null;
  var hdr=rows[0].map(function(h){return String(h).trim().toLowerCase();});
  var need=['week','date','day','period','start','end','subject','professor','is_exam'];
  for(var i=0;i<need.length;i++){
    if(hdr.indexOf(need[i])<0)return{error:'필수 열 "'+need[i]+'"이 없습니다.'};
  }
  var items=[];
  for(var r=1;r<rows.length;r++){
    var row=rows[r];
    if(row.every(function(c){return!String(c||'').trim();}))continue;
    var obj={};
    for(var c=0;c<hdr.length;c++){obj[hdr[c]]=String(row[c]||'').trim();}
    var examVal=(obj['is_exam']||'').toLowerCase();
    items.push({week:obj['week'],date:obj['date'],day:obj['day'],
      period:parseInt(obj['period'])||1,start:obj['start'],end:obj['end'],
      subject:obj['subject'],professor:obj['professor'],
      is_exam:(examVal==='true'||examVal==='1'||examVal==='yes')});
  }
  return items;
}

/* ── 업로드된 데이터로 시간표 재구성 ── */
function buildFromItems(items,nativeWdd,nativeEd){
  /* 1. 주차 목록 */
  var weekSet={};
  for(var i=0;i<items.length;i++)weekSet[items[i].week]=true;
  var weeks=Object.keys(weekSet).sort(function(a,b){return parseInt(a)-parseInt(b);});
  wks=weeks;

  /* 2. 주차별 날짜 맵 - native wdd 우선 */
  if(nativeWdd){
    wdd=nativeWdd;
  }else{
    wdd={};
    for(var i=0;i<items.length;i++){
      var it=items[i];
      if(!wdd[it.week])wdd[it.week]={};
      wdd[it.week][it.day]=it.date;
    }
  }

  /* 3. 색상 맵 - 밝고 구분되는 팔레트 (파랑 없음) */
  var palette=['#8B5CF6','#10B981','#F97316','#22C55E','#EC4899','#D97706','#F59E0B','#14B8A6','#84CC16','#F43F5E','#A78BFA','#EF4444'];
  var pIdx=0;
  for(var i=0;i<items.length;i++){
    var s=items[i].subject;
    if(!cmap[s]){cmap[s]=palette[pIdx%palette.length];pIdx++;}
  }

  /* 4. 시험 날짜 목록 */
  if(nativeEd){
    ed=nativeEd;
  }else{
    var edSet={};
    for(var i=0;i<items.length;i++){if(items[i].is_exam)edSet[items[i].date]=true;}
    ed=Object.keys(edSet);
  }

  /* 5. merged 교체 */
  merged=items;

  /* 6. fsubj 재구성 */
  var sSet={};
  for(var i=0;i<items.length;i++)sSet[items[i].subject]=true;
  fsubj=Object.keys(sSet).sort();
  fsubj2=fsubj.slice();

  /* 7. 주간 HTML 재구성 */
  wh={};
  wl={};
  for(var wi=0;wi<weeks.length;wi++){
    var w=weeks[wi];
    var weekItems=items.filter(function(it){return it.week===w;});
    wh[w]=buildWeekTable(w,weekItems);
    wl[w]=buildLegend(weekItems);
  }
}

function buildWeekTable(w,items){
  var dd=wdd[w]||{};
  var PERIODS=[
    {n:1,t:'8:30'},{n:2,t:'9:30'},{n:3,t:'10:30'},{n:4,t:'11:30'},
    {n:5,t:'13:30'},{n:6,t:'14:30'},{n:7,t:'15:30'},{n:8,t:'16:30'},
    {n:9,t:'17:30'},{n:10,t:'18:30'}
  ];
  var HOUR_TO_PERIOD={'8':1,'9':2,'10':3,'11':4,'13':5,'14':6,'15':7,'16':8,'17':9,'18':10};

  /* period -> day -> item 맵 (각 교시·요일별 수업) */
  var grid={};
  for(var pi=1;pi<=10;pi++){grid[pi]={};}

  for(var i=0;i<items.length;i++){
    var it=items[i];
    if(!it.day||DAYS.indexOf(it.day)<0)continue;
    var h=parseInt((it.start||'8:30').split(':')[0]);
    var sp=HOUR_TO_PERIOD[String(h)]||1;
    /* 같은 교시에 여러 항목이면 마지막 우선 (실제론 교시당 1개) */
    if(!grid[sp])grid[sp]={};
    grid[sp][it.day]=it;
  }

  /* HTML 생성 - rowspan 없이 교시별 독립 렌더 */
  var html='<table class="tt"><thead><tr><th class="th-t"></th>';
  DAYS.forEach(function(d){
    var dt=dd[d]||'';
    html+='<th class="th-d" data-day="'+d+'" data-date="'+dt+'">'+d+'<br><span class="th-date">'+(dt?fmtDate(dt):'')+'</span></th>';
  });
  html+='</tr></thead><tbody>';

  for(var pi=0;pi<PERIODS.length;pi++){
    var pn=PERIODS[pi].n;
    var pt=PERIODS[pi].t;

    /* 점심 행 */
    if(pn===5){
      html+='<tr class="lunchrow"><td class="td-t"><span style="font-size:12px">🍱</span></td>';
      html+='<td colspan="5" class="td-lunch">점심시간&nbsp;&nbsp;12:20 ~ 13:30</td></tr>';
    }

    html+='<tr><td class="td-t"><span class="pn">'+pn+'</span><span class="pt">'+pt+'</span></td>';

    DAYS.forEach(function(d){
      var it=grid[pn]&&grid[pn][d];
      if(!it){
        html+='<td class="td-c" data-day="'+d+'"></td>';
        return;
      }
      var bg=gcol(it.subject);
      var isHol=isHoliday(it.subject);
      if(isHol){
        html+='<td class="td-c" data-day="'+d+'">';
        html+='<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">';
        html+='<div style="font-size:15px">🗓</div>';
        html+='<div style="font-size:9px;font-weight:600;color:#9CA3AF;text-align:center;word-break:keep-all;line-height:1.3">'+it.subject+'</div>';
        html+='</div></td>';
      }else{
        html+='<td class="td-c" data-day="'+d+'">';
        html+='<div class="card" style="background:'+bg+'">';
        if(isEx(it.subject)){
          var lb=exLabel(it.subject);
          html+='<div class="cn-s cn-exam">‼️ '+lb[0]+'</div>';
          if(lb[1])html+='<div class="cn-name">'+lb[1]+'</div>';
        }else{
          html+='<div class="cn-s">'+it.subject+'</div>';
        }
        if(it.professor)html+='<div class="cn-p">'+it.professor+'</div>';
        html+='</div></td>';
      }
    });

    html+='</tr>';
  }
  html+='</tbody></table>';
  return html;
}

function buildLegend(items){
  var seen={};
  var html='';
  for(var i=0;i<items.length;i++){
    var s=items[i].subject;
    if(seen[s]||isHoliday(s)||isEv(s))continue;
    seen[s]=true;
    html+='<div class="li"><span class="ld" style="background:'+gcol(s)+'"></span><span class="ln">'+s+'</span></div>';
  }
  return html;
}

/* ══════════════════════════════════════════
   엑셀 업로드 UI
══════════════════════════════════════════ */
function openXL(){document.getElementById('xl-ovl').classList.add('show');}
function closeXL(){document.getElementById('xl-ovl').classList.remove('show');pendingData=null;document.getElementById('xl-status').textContent='';document.getElementById('xl-apply').disabled=true;}

function handleFile(file){
  if(!file)return;
  var ext=file.name.split('.').pop().toLowerCase();
  var status=document.getElementById('xl-status');
  var applyBtn=document.getElementById('xl-apply');
  pendingData=null;
  applyBtn.disabled=true;
  status.className='xl-status';
  status.textContent='파일 읽는 중...';

  var reader=new FileReader();

  if(ext==='csv'){
    reader.onload=function(e){
      try{
        var rows=parseCSV(e.target.result);
        var result=csvRowsToItems(rows);
        if(!result){status.className='xl-status err';status.textContent='파일이 비어있습니다.';return;}
        if(result.error){status.className='xl-status err';status.textContent=result.error;return;}
        pendingData=result;
        status.className='xl-status ok';
        status.textContent='✓ '+result.length+'개 수업 항목 인식됨';
        applyBtn.disabled=false;
      }catch(err){status.className='xl-status err';status.textContent='파싱 오류: '+err.message;}
    };
    reader.readAsText(file,'UTF-8');

  }else if(ext==='xlsx'||ext==='xls'){
    if(typeof XLSX==='undefined'){
      status.className='xl-status err';
      status.textContent='XLSX 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.';
      return;
    }
    reader.onload=function(e){
      try{
        var data=new Uint8Array(e.target.result);
        var wb=XLSX.read(data,{type:'array',cellDates:false});
        var ws=wb.Sheets[wb.SheetNames[0]];
        /* raw 2D 배열로 변환 (날짜는 숫자 serial로 유지) */
        var rawRows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
        var result=csvRowsToItems(rawRows);
        if(!result){status.className='xl-status err';status.textContent='파일이 비어있습니다.';return;}
        if(result.error){status.className='xl-status err';status.textContent=result.error;return;}
        /* native 파서는 items 배열 직접 반환 */
        var items=Array.isArray(result)?result:null;
        if(!items){status.className='xl-status err';status.textContent='파싱 오류';return;}
        /* native 형식에서 wdd/ed도 재구성 */
        var nativeRes=parseNativeRows(rawRows);
        if(nativeRes&&nativeRes.wddLocal){
          /* buildFromItems 전에 wdd/ed 미리 설정 */
          pendingData={items:items,nativeWdd:nativeRes.wddLocal,nativeEd:nativeRes.edLocal};
        }else{
          pendingData=items;
        }
        status.className='xl-status ok';
        status.textContent='✓ '+items.length+'개 수업 항목 인식됨 ('+wb.SheetNames[0]+')';
        applyBtn.disabled=false;
      }catch(err){status.className='xl-status err';status.textContent='XLSX 파싱 오류: '+err.message;}
    };
    reader.readAsArrayBuffer(file);

  }else{
    status.className='xl-status err';
    status.textContent='CSV 또는 XLSX 파일만 지원합니다.';
  }
}

/* ══════════════════════════════════════════
   주간 뷰
══════════════════════════════════════════ */
function renderW(){
  var w=wks[ci],t=today(),dd=wdd[w]||{};
  document.getElementById('main').innerHTML=
    '<div class="sw">'+(wh[w]||'<p style="padding:20px;color:#8E8E93">시간표 데이터 없음</p>')+'</div>'
    +'<div class="legend"><div class="lg-title">수강 과목</div><div class="lg-grid">'+(wl[w]||'')+'</div></div>';
  for(var i=0;i<DAYS.length;i++){
    var d=DAYS[i];
    if(dd[d]===t){
      var els=document.querySelectorAll('[data-day="'+d+'"]');
      for(var j=0;j<els.length;j++)els[j].classList.add('tc');
    }
  }
}

/* ══════════════════════════════════════════
   목록 뷰
══════════════════════════════════════════ */
function lcardH(it){
  var c=gcol(it.subject),sh='',ex='';
  if(isEx(it.subject)){
    var lb=exLabel(it.subject),et=lb[0],ba=lb[1];
    sh='<div class="lc-s" style="color:#C0392B">‼️ '+et+'</div>'+(ba?'<div style="font-size:12px;color:#555;margin-top:2px">'+ba+'</div>':'');
    ex='border:2px solid '+c+';';
  }else{sh='<div class="lc-s">'+it.subject+'</div>';}
  var ph=it.professor?'<div class="lc-p">'+it.professor+'</div>':'';
  return'<div class="lcard" style="'+ex+'"><div class="lc-bar" style="background:'+c+'"></div>'
    +'<div class="lc-body">'+sh+ph+'<div class="lc-t">'+it.day+'요일 '+it.start+'~'+it.end+'</div></div></div>';
}
function byDateH(items){
  var bd={};
  for(var i=0;i<items.length;i++){var it=items[i];if(!bd[it.date])bd[it.date]=[];bd[it.date].push(it);}
  var dates=Object.keys(bd).sort(),h='';
  for(var di=0;di<dates.length;di++){
    var dt=dates[di],d=new Date(dt),grp=bd[dt];
    var lbl=fmtDate(dt)+' ('+WN[d.getDay()]+')';
    var hx=false;for(var gi=0;gi<grp.length;gi++)if(isEx(grp[gi].subject)){hx=true;break;}
    h+='<div class="dg"><div class="dh">'+(hx?'‼️ ':'')+lbl+'</div>';
    grp.sort(function(a,b){return a.period-b.period;});
    for(var gi2=0;gi2<grp.length;gi2++)h+=lcardH(grp[gi2]);
    h+='</div>';
  }
  return h;
}
function renderL(){
  document.getElementById('main').innerHTML='<div class="list-wrap">'+byDateH(merged)+'</div>';
}

/* ══════════════════════════════════════════
   필터 뷰
══════════════════════════════════════════ */
function renderF(){
  var eS=fsubj.filter(function(s){return isEx(s);});
  var nS=fsubj.filter(function(s){return!isEx(s)&&!isEv(s);});
  var h='<div class="fw">';
  var eo=fExam;
  h+='<div class="fs"><div class="fs-ttl">빠른 필터</div><div class="chips">';
  h+='<button class="chip" id="chip-exam" style="'+(eo?'background:#E74C3C;border-color:#E74C3C;color:#fff;font-weight:600':'border-color:#E74C3C;color:#E74C3C')+'">‼️ 시험만 보기</button>';
  var aon=!fExam&&fsubj2.length===fsubj.length;
  h+='<button class="chip" id="chip-all" style="'+(aon?'background:#007AFF;border-color:#007AFF;color:#fff;font-weight:600':'')+'" >전체 선택</button>';
  h+='<button class="chip" id="chip-clr">전체 해제</button>';
  h+='</div></div>';
  if(nS.length){
    h+='<div class="fs"><div class="fs-ttl">일반 과목</div><div class="chips">';
    for(var i=0;i<nS.length;i++){
      var s=nS[i],c=gcol(s),on2=!fExam&&fsubj2.indexOf(s)>=0;
      h+='<button class="chip fchip" data-s="'+s+'" style="'+(on2?'background:'+c+';border-color:'+c+';color:#fff;font-weight:600':'border-color:'+c+';color:'+c)+'">'+s+'</button>';
    }
    h+='</div></div>';
  }
  if(eS.length){
    h+='<div class="fs"><div class="fs-ttl">‼️ 시험</div><div class="chips">';
    for(var j=0;j<eS.length;j++){
      var se=eS[j],ce=gcol(se),oe=(fsubj2.indexOf(se)>=0&&!fExam)||fExam;
      var lb2=exLabel(se),et2=lb2[0],ba2=lb2[1];
      h+='<button class="chip fchip" data-s="'+se+'" style="'+(oe?'background:'+ce+';border-color:'+ce+';color:#fff;font-weight:600':'border-color:'+ce+';color:'+ce)+'">‼️ '+et2+(ba2?' '+ba2:'')+'</button>';
    }
    h+='</div></div>';
  }
  h+='<div id="fres"></div></div>';
  document.getElementById('main').innerHTML=h;

  document.getElementById('chip-exam').onclick=function(){fExam=!fExam;fsubj2=fExam?fsubj.filter(function(s){return isEx(s);}):fsubj.slice();renderF();};
  document.getElementById('chip-all').onclick=function(){fExam=false;fsubj2=fsubj.slice();renderF();};
  document.getElementById('chip-clr').onclick=function(){fExam=false;fsubj2=[];renderF();};
  var chips=document.querySelectorAll('.fchip');
  for(var k=0;k<chips.length;k++){
    chips[k].onclick=function(){
      var s=this.getAttribute('data-s');
      fExam=false;
      var idx=fsubj2.indexOf(s);
      if(idx>=0)fsubj2.splice(idx,1);else fsubj2.push(s);
      renderF();
    };
  }
  renderFR();
}
function renderFR(){
  var items=merged.slice();
  if(fExam)items=items.filter(function(i){return isEx(i.subject);});
  else items=items.filter(function(i){return fsubj2.indexOf(i.subject)>=0||isEv(i.subject);});
  var el=document.getElementById('fres');if(!el)return;
  if(!items.length){el.innerHTML='<div class="no-res">조건에 맞는 수업이 없습니다</div>';return;}
  el.innerHTML='<div class="list-wrap">'+byDateH(items)+'</div>';
}

/* ══════════════════════════════════════════
   캘린더 오버레이
══════════════════════════════════════════ */
function openCal(){
  /* 현재 보고 있는 주차의 첫 날짜로 캘린더 이동 */
  var v=wvals(wks[ci]).sort();
  var ref=v.length?new Date(v[0]):new Date();
  cy=ref.getFullYear();cm2=ref.getMonth();
  renderCal();document.getElementById('ovl').classList.add('show');
}
function closeCal(){document.getElementById('ovl').classList.remove('show');}
function renderCal(){
  document.getElementById('cal-ml').textContent=cy+'년 '+ML[cm2];
  var t=today(),cv=wvals(wks[ci]);

  /* 날짜→주차 역매핑 (merged 기반 - 모든 수업 날짜 포함) */
  var dateToWeek={};
  for(var mi=0;mi<merged.length;mi++){
    var mdt=merged[mi].date,mwk=merged[mi].week;
    if(mdt&&mwk)dateToWeek[mdt]=mwk;
  }
  /* wdd도 포함 */
  for(var wi=0;wi<wks.length;wi++){
    var w2=wks[wi],o=wdd[w2]||{},ks2=Object.keys(o);
    for(var ki=0;ki<ks2.length;ki++){if(o[ks2[ki]])dateToWeek[o[ks2[ki]]]=w2;}
  }

  var edSet={};for(var ei=0;ei<ed.length;ei++)edSet[ed[ei]]=true;
  var first=new Date(cy,cm2,1),last=new Date(cy,cm2+1,0),g='';
  for(var i=0;i<first.getDay();i++)g+='<div class="cday"></div>';
  for(var day=1;day<=last.getDate();day++){
    var ds=cy+'-'+p2(cm2+1)+'-'+p2(day);
    var dow=new Date(cy,cm2,day).getDay(),isWD=dow>=1&&dow<=5;
    var hx=!!edSet[ds],it2=ds===t,iw=cv.indexOf(ds)>=0&&isWD;
    var ck=!!dateToWeek[ds];
    var cls='cday'+(ck?' ck':'')+(it2?' td2':'')+(iw&&!it2?' iw':'');
    var dot=hx?'<div class="cdot"><span class="dtr"></span></div>':'<div class="cdot"></div>';
    var oc=ck?' id="cd-'+ds+'"':'';
    g+='<div class="'+cls+'"'+oc+'><div class="cdn">'+day+'</div>'+dot+'</div>';
  }
  document.getElementById('cal-g').innerHTML=g;
  var ckEls=document.querySelectorAll('.cday.ck');
  for(var ci2=0;ci2<ckEls.length;ci2++){
    ckEls[ci2].onclick=(function(el,dtw){
      return function(){
        var id=el.id;if(!id)return;
        var ds2=id.replace('cd-','');
        var targetWk=dtw[ds2];
        if(targetWk){
          for(var ii=0;ii<wks.length;ii++){if(wks[ii]===targetWk){ci=ii;break;}}
        }else{
          for(var ii=0;ii<wks.length;ii++){if(wvals(wks[ii]).indexOf(ds2)>=0){ci=ii;break;}}
        }
        closeCal();setView('weekly');render();
      };
    })(ckEls[ci2],dateToWeek);
  }
}

/* ══════════════════════════════════════════
   헤더 & 렌더
══════════════════════════════════════════ */
function updHdr(){
  var w=wks[ci];
  document.getElementById('wl').textContent=w+'주차';
  var v=wvals(w).sort();
  document.getElementById('wr').textContent=v.length>=2?fmtDate(v[0])+' ~ '+fmtDate(v[v.length-1]):(v[0]?fmtDate(v[0]):'');
  document.getElementById('pb').disabled=(ci===0);
  document.getElementById('nb').disabled=(ci===wks.length-1);
}

function setView(v){
  vw=v;
  document.getElementById('bn-w').className='bn'+(v==='weekly'?' on':'');
  document.getElementById('bn-l').className='bn'+(v==='list'?' on':'');
  document.getElementById('bn-f').className='bn'+(v==='filter'?' on':'');
  document.getElementById('wnav').style.display=(v==='weekly')?'flex':'none';
  render();
}

function render(){
  updHdr();
  if(vw==='weekly')renderW();
  else if(vw==='list')renderL();
  else renderF();
}

/* ══════════════════════════════════════════
   초기화
══════════════════════════════════════════ */
function init(){
  /* wh 데이터 후처리: 날짜 하이픈→점, 색상 교체, td-e 통일, rowspan 제거 */
  var oldColors = {
    /* 어두운 → 밝은 색상 매핑 */
    '#6D28D9':'#8B5CF6','#A16207':'#D97706','#B91C1C':'#EF4444',
    '#DC2626':'#EF4444','#065F46':'#10B981','#C2410C':'#F97316',
    '#EA580C':'#F97316','#0F766E':'#14B8A6','#3F6212':'#84CC16',
    '#4D7C0F':'#84CC16','#15803D':'#22C55E','#166534':'#22C55E',
    '#86198F':'#EC4899','#9D174D':'#EC4899','#7C2D12':'#F59E0B',
    '#9F1239':'#F43F5E','#92400E':'#A78BFA',
    '#B45309':'#A78BFA','#7C3AED':'#8B5CF6','#9333EA':'#8B5CF6'
  };
  for(var wk in wh){
    /* 날짜 표기 변환: 03-17 → 03.17 */
    wh[wk]=wh[wk].replace(/(\d{2})-(\d{2})/g,'$1.$2');
    /* 색상 교체 */
    for(var oc in oldColors){
      wh[wk]=wh[wk].split('background:'+oc+'"').join('background:'+oldColors[oc]+'"');
    }
    /* rowspan 속성 제거 (병합 셀 해제) */
    wh[wk]=wh[wk].replace(/ rowspan="\d+"/g,'');
    /* td-c td-e → td-c (빈 셀 클래스 통일) */
    wh[wk]=wh[wk].split('class="td-c td-e"').join('class="td-c"');
    /* 색상 교체 */
    for(var oc in oldColors){
      wh[wk]=wh[wk].split('background:'+oc+'"').join('background:'+oldColors[oc]+'"');
      wh[wk]=wh[wk].split('background:'+oc+';').join('background:'+oldColors[oc]+';');
    }
    /* 휴일 카드 교체 */
    wh[wk]=wh[wk].replace(/<td class="td-c"([^>]*)><div class="card" style="background:#95A5A6"><div class="cn-s">([^<]+)<\/div><div class="cn-t">([^<]+)<\/div><\/div><\/td>/g,
      function(match,attrs,subj,time){
        return '<td class="td-c td-e"'+attrs+'>'+
          '<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">'+
          '<div style="font-size:16px">🗓</div>'+
          '<div style="font-size:9.5px;font-weight:600;color:#8E8E93;text-align:center;word-break:keep-all;line-height:1.3">'+subj+'</div>'+
          '</div></td>';
      });
    /* wl(범례) 색상 교체 및 휴일 항목 제거 */
    if(wl[wk]){
      for(var oc2 in oldColors){
        wl[wk]=wl[wk].split('background:'+oc2+'"').join('background:'+oldColors[oc2]+'"');
      }
      /* #95A5A6 (휴일/행사) 범례 항목 제거 */
      wl[wk]=wl[wk].replace(/<div class="li"><span class="ld" style="background:#95A5A6"><\/span>[\s\S]*?<\/div>/g,'');
    }
  }
  var t=today();
  for(var i=0;i<wks.length;i++){
    var v=wvals(wks[i]).sort();
    if(v.length&&t>=v[0]&&t<=v[v.length-1]){ci=i;break;}
  }
  var nd=new Date();cy=nd.getFullYear();cm2=nd.getMonth();

  document.getElementById('pb').onclick=function(){if(ci>0){ci--;render();}};
  document.getElementById('nb').onclick=function(){if(ci<wks.length-1){ci++;render();}};
  document.getElementById('bn-w').onclick=function(){setView('weekly');};
  document.getElementById('bn-l').onclick=function(){setView('list');};
  document.getElementById('bn-f').onclick=function(){setView('filter');};
  document.getElementById('cal-btn').onclick=function(){openCal();};
  document.getElementById('cal-x').onclick=function(){closeCal();};
  document.getElementById('ovl').onclick=function(e){if(e.target===document.getElementById('ovl'))closeCal();};
  document.getElementById('cal-p').onclick=function(){cm2--;if(cm2<0){cm2=11;cy--;}renderCal();};
  document.getElementById('cal-n').onclick=function(){cm2++;if(cm2>11){cm2=0;cy++;}renderCal();};

  /* 엑셀 업로드 */
  document.getElementById('xl-btn-open').onclick=openXL;
  document.getElementById('xl-x').onclick=closeXL;
  document.getElementById('xl-ovl').onclick=function(e){if(e.target===document.getElementById('xl-ovl'))closeXL();};

  var dropzone=document.getElementById('xl-drop');
  var fileInput=document.getElementById('xl-file');
  dropzone.onclick=function(){fileInput.click();};
  fileInput.onchange=function(){if(fileInput.files[0])handleFile(fileInput.files[0]);};
  dropzone.ondragover=function(e){e.preventDefault();dropzone.classList.add('drag');};
  dropzone.ondragleave=function(){dropzone.classList.remove('drag');};
  dropzone.ondrop=function(e){
    e.preventDefault();dropzone.classList.remove('drag');
    var f=e.dataTransfer&&e.dataTransfer.files[0];
    if(f)handleFile(f);
  };

  document.getElementById('xl-apply').onclick=function(){
    if(!pendingData)return;
    var items=Array.isArray(pendingData)?pendingData:(pendingData.items||pendingData);
    var nWdd=(!Array.isArray(pendingData)&&pendingData.nativeWdd)||null;
    var nEd=(!Array.isArray(pendingData)&&pendingData.nativeEd)||null;
    buildFromItems(items,nWdd,nEd);
    ci=0;
    closeXL();
    setView('weekly');
    render();
  };

  render();

  /* iOS Safari 홈 화면 미추가 시 안내 토스트 */
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone=window.navigator.standalone===true;
  if(isIOS&&!isStandalone&&!sessionStorage.getItem('pwa_shown')){
    setTimeout(function(){
      var t=document.getElementById('pwa-toast');
      if(t){t.style.display='block';}
      sessionStorage.setItem('pwa_shown','1');
      setTimeout(function(){var t2=document.getElementById('pwa-toast');if(t2)t2.style.display='none';},7000);
    },2500);
  }
}

init();
</script>
