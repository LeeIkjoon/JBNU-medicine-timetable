<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f4f8;color:#1a2333;padding-bottom:20px;}
.hdr{background:linear-gradient(135deg,#1a3a6b,#2d5fa0);color:white;padding:14px 14px 10px;display:flex;align-items:center;justify-content:space-between;}
.hdr h1{font-size:1.05rem;font-weight:700;}.hdr p{font-size:.72rem;opacity:.75;margin-top:2px;}
.ubtn{background:rgba(255,255,255,.2);color:white;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:7px 11px;font-size:.75rem;cursor:pointer;font-weight:700;}
#xfile{display:none;}
.tabs{display:flex;background:white;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.tab{flex:1;padding:11px 4px;border:none;background:none;font-size:.78rem;font-weight:700;color:#94a3b8;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab.on{color:#1a3a6b;border-bottom-color:#1a3a6b;}
.fbar{display:flex;align-items:center;gap:7px;padding:8px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.fc{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid #e2e8f0;background:white;font-size:.72rem;font-weight:700;color:#64748b;cursor:pointer;}
.fc.on{background:#1a3a6b;color:white;border-color:#1a3a6b;}
.fsel{flex-shrink:0;padding:5px 26px 5px 10px;border-radius:20px;border:1.5px solid #e2e8f0;background:white;font-size:.72rem;font-weight:700;color:#64748b;outline:none;-webkit-appearance:none;appearance:none;}
.fsel.on{background:#1a3a6b;color:white;border-color:#1a3a6b;}
.wnav{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:white;border-bottom:1px solid #e2e8f0;}
.wb{background:#1a3a6b;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:.85rem;cursor:pointer;font-weight:700;min-width:64px;}
.wb:disabled{background:#cbd5e0;}.wb:active{background:#2d5fa0;}
.wi{text-align:center;flex:1;}.wi .wn{font-size:1rem;font-weight:800;color:#1a3a6b;}.wi .wdt{font-size:.7rem;color:#718096;margin-top:2px;}
/* table */
.cont{padding:10px;max-width:900px;margin:0 auto;}
.tw{overflow-x:auto;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.09);-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;table-layout:fixed;background:white;}
col.pc{width:54px;}col.dc{width:calc((100% - 54px)/5);}
thead th{background:#1a3a6b;color:white;padding:9px 3px;font-size:.75rem;font-weight:700;text-align:center;border:1px solid #162f5a;word-break:keep-all;}
tbody td{border:1px solid #e2e8f0;vertical-align:top;text-align:center;padding:3px;}
tbody td.plbl{background:#f1f5f9;font-weight:600;font-size:.6rem;color:#4a5568;padding:4px 2px;vertical-align:middle;line-height:1.4;word-break:keep-all;}
.ci{padding:4px 3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:6px;min-height:42px;word-break:keep-all;}
.ci .s{font-weight:700;font-size:.68rem;line-height:1.35;word-break:keep-all;white-space:normal;width:100%;text-align:center;}
.ci .pp{font-size:.6rem;opacity:.85;white-space:normal;width:100%;text-align:center;}
.ci.dim{opacity:.12;}
.holi{padding:4px 3px;display:flex;align-items:center;justify-content:center;min-height:42px;}
.holi span{font-size:.63rem;font-weight:600;color:#e53e3e;word-break:keep-all;text-align:center;}
/* legend */
.leg{display:flex;flex-wrap:wrap;gap:6px;padding:12px 4px;}
.legh{font-size:.76rem;font-weight:700;color:#4a5568;width:100%;margin-bottom:2px;}
.lgi{display:flex;align-items:center;gap:5px;font-size:.74rem;}
.lgd{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
/* list */
.lw{padding:10px;max-width:600px;margin:0 auto;}
.ldg{margin-bottom:14px;}
.ldh{font-size:.77rem;font-weight:800;color:#1a3a6b;padding:5px 10px;margin-bottom:5px;border-left:3px solid #1a3a6b;background:#f0f4f8;border-radius:0 6px 6px 0;}
.ldh.tod{color:#4f46e5;border-left-color:#4f46e5;}
.lcard{background:white;border-radius:10px;padding:9px 11px;margin-bottom:5px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:flex-start;gap:9px;border-left:4px solid transparent;}
.lcard .lt{font-size:.64rem;font-weight:700;color:#94a3b8;min-width:50px;padding-top:2px;line-height:1.4;}
.lcard .lb{flex:1;}
.lcard .ls{font-size:.8rem;font-weight:700;}
.lcard .lp{font-size:.7rem;color:#64748b;margin-top:2px;}
.ebadge{display:inline-block;background:#fee2e2;color:#991b1b;font-size:.6rem;font-weight:800;padding:2px 6px;border-radius:4px;margin-bottom:3px;}
.empty{text-align:center;padding:48px 20px;color:#94a3b8;font-size:.9rem;}
/* calendar */
.cw{padding:10px;max-width:400px;margin:0 auto;}
.cnav{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:6px;}
.cnav button{background:#1a3a6b;color:white;border:none;border-radius:6px;padding:6px 14px;font-size:.84rem;cursor:pointer;font-weight:700;}
.cnav button:active{background:#2d5fa0;}
.ctit{font-size:1rem;font-weight:800;color:#1a3a6b;}
.cgrid{background:white;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.09);overflow:hidden;}
.cdrow{display:grid;grid-template-columns:repeat(7,1fr);background:#1a3a6b;}
.cdrow div{text-align:center;padding:7px 2px;font-size:.7rem;font-weight:700;color:white;}
.cdays{display:grid;grid-template-columns:repeat(7,1fr);}
.cd{min-height:46px;padding:4px 2px;display:flex;flex-direction:column;align-items:center;border-top:1px solid #f1f5f9;cursor:pointer;}
.cd:active{background:#f0f4f8;}.cd.emp{cursor:default;pointer-events:none;}
.cd .dn{font-size:.78rem;font-weight:600;color:#374151;width:27px;height:27px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cd.hc .dn{color:#1a3a6b;font-weight:800;}
.cd.tod .dn{background:#4f46e5;color:white!important;font-weight:800;}
.cd.sw{background:#eef2ff;}.cd.sw .dn{color:#4f46e5;}
.cdots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;}
.cdot{width:5px;height:5px;border-radius:50%;}
.chint{margin-top:10px;font-size:.72rem;color:#64748b;text-align:center;padding:0 4px;}

      var cl=e.hl?['#fff','#e53e3e']:gc(e.sj);
      h+='<div class="lcard" style="border-left-color:'+cl[1]+'">';
      h+='<div class="lt">'+e.pn+'<br>'+e.pt+'</div>';
      h+='<div class="lb">';
      if(e.ex)h+='<div class="ebadge">‼️ 시험</div>';
      h+='<div class="ls" style="color:'+cl[1]+'">'+e.sj+'</div>';
      if(e.pr)h+='<div class="lp">👨‍🏫 '+e.pr+'</div>';
      h+='</div></div>';
    });
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

// ── 캘린더 ──
function rCal(){
  var yr=ST.cy,mo=ST.cm;
  var dotMap={};
  D.forEach(function(d){
    if(!d.hl&&d.dt){
      if(!dotMap[d.dt])dotMap[d.dt]=[];
      var cl=gc(d.sj);
      if(dotMap[d.dt].indexOf(cl[1])<0&&dotMap[d.dt].length<4)dotMap[d.dt].push(cl[1]);
    }
  });
  var selDmap=W[WKS[ST.wi].toString()]||{};
  var selDs=Object.keys(selDmap).map(function(k){return selDmap[k];}).filter(Boolean);
  var fd=new Date(yr,mo,1).getDay();
  var dim=new Date(yr,mo+1,0).getDate();
  var MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var DN=['일','월','화','수','목','금','토'];
  var h='<div class="cw">';
  h+='<div class="cnav"><button onclick="cmv(-1)">◀</button><div class="ctit">'+yr+'년 '+MN[mo]+'</div><button onclick="cmv(1)">▶</button></div>';
  h+='<div class="cgrid"><div class="cdrow">';
  DN.forEach(function(d){h+='<div>'+d+'</div>';});
  h+='</div><div class="cdays">';
  for(var i=0;i<fd;i++)h+='<div class="cd emp"></div>';
  for(var day=1;day<=dim;day++){
    var ds=yr+'-'+p2(mo+1)+'-'+p2(day);
    var hc=!!dotMap[ds];var isT=ds===TODAY;var isSel=selDs.indexOf(ds)>=0;
    var canJump=D2W[ds]!==undefined;
    h+='<div class="cd'+(hc?' hc':'')+(isT?' tod':'')+(isSel?' sw':'')+'"'+(canJump?' onclick="jump(''+ds+'')"':'')+' >';
    h+='<div class="dn">'+day+'</div>';
    if(hc){h+='<div class="cdots">';dotMap[ds].slice(0,4).forEach(function(c){h+='<div class="cdot" style="background:'+c+'"></div>';});h+='</div>';}
    h+='</div>';
  }
  h+='</div></div>';
  h+='<div class="chint">날짜를 클릭하면 해당 주차로 이동합니다<br>🔵 = 선택된 주차 · ⚫ = 오늘</div></div>';
  document.getElementById('app').innerHTML=h;
}
function cmv(d){ST.cm+=d;if(ST.cm<0){ST.cm=11;ST.cy--;}if(ST.cm>11){ST.cm=0;ST.cy++;}rCal();}
function jump(ds){var ix=D2W[ds];if(ix===undefined)return;ST.wi=ix;setTab('week');}

// ── 엑셀 업로드 (SheetJS 동적 로딩) ──
document.getElementById('xfile').addEventListener('change',function(ev){
  var file=ev.target.files[0];if(!file)return;
  function doRead(){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!rows.length){alert('데이터 없음');return;}
        var keys=Object.keys(rows[0]);
        function fc(kw){return keys.find(function(k){return k.replace(/\n/g,'').indexOf(kw)>=0;})||'';}
        var PC=[fc('1교시'),fc('2교시'),fc('3교시'),fc('4교시'),fc('5교시'),fc('6교시'),fc('7교시'),fc('8교시'),fc('9교시'),fc('10교시')];
        var wkC=fc('주차'),dtC=fc('날짜'),dwC=fc('요일');
        var HK=['공휴일','휴일','근로자의 날','어린이날','현충일','광복절','추석','설날','삼일절','개천절','한글날','대체','휴강'];
        var nd=[],nw={};
        rows.forEach(function(row){
          var wk=row[wkC];if(!wk)return;var wkn=parseInt(wk);if(isNaN(wkn))return;
          var dw=String(row[dwC]||'').trim();if(!dw)return;
          var dt=row[dtC];var ds='';
          if(dt instanceof Date)ds=dt.toISOString().slice(0,10);
          else if(typeof dt==='string'&&dt.length>=10)ds=dt.slice(0,10);
          var wkk=wkn.toString();if(!nw[wkk])nw[wkk]={};if(!nw[wkk][dw])nw[wkk][dw]=ds;
          PC.forEach(function(col,idx){
            if(!col||!String(row[col]||'').trim())return;
            var lines=String(row[col]).trim().split('\n').map(function(l){return l.trim();}).filter(Boolean);
            var pts=lines[0].split('-',2);var sj=pts[0].trim(),pr=pts.length>1?pts[1].trim():'';
            var ex=lines.some(function(l){return l.indexOf('시험')>=0||l.indexOf('퀴즈')>=0;});
            var hl=HK.some(function(k){return sj.indexOf(k)>=0;});
            nd.push({wk:wkn,dt:ds,dw:dw,pi:idx,pn:PD[idx][0],pt:PD[idx][1],sj:sj,pr:pr,ex:ex,hl:hl});
          });
        });
        D=nd;W=nw;CM={};CI=0;D.forEach(function(d){if(!d.hl)gc(d.sj);});
        WKS=[];var seen={};D.forEach(function(d){if(!seen[d.wk]){seen[d.wk]=1;WKS.push(d.wk);}});WKS.sort(function(a,b){return a-b;});
        D2W={};Object.keys(W).forEach(function(wk){var ix=WKS.indexOf(parseInt(wk));var dm=W[wk];Object.keys(dm).forEach(function(dw){if(dm[dw]&&ix>=0)D2W[dm[dw]]=ix;});});
        SUBJS=[];var seen2={};D.forEach(function(d){if(!d.hl&&!seen2[d.sj]){seen2[d.sj]=1;SUBJS.push(d.sj);}});SUBJS.sort();
        var sel=document.getElementById('fsel');while(sel.options.length>1)sel.remove(1);
        SUBJS.forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
        ST.wi=Math.max(0,Math.min(WKS.length-1,ST.wi));
        render();alert('✅ 업데이트 완료! ('+nd.length+'개 수업)');
      }catch(err){alert('오류: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }
  if(typeof XLSX!=='undefined'){doRead();}
  else{
    var s=document.createElement('script');
    s.src='https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
    s.onload=doRead;
    s.onerror=function(){alert('SheetJS 로딩 실패. 인터넷 연결을 확인하세요.');};
    document.head.appendChild(s);
  }
});

// ── 시작 ──
render();
</script>
</body>
